[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^7.2.0

; Board: AITRIP ESP32-2432S024R (Guition variant, ST7789, resistive touch)
; TFT on native HSPI pins (12/13/14/15). USE_HSPI_PORT prevents VSPI conflict
; with touchSPI (VSPI on 25/32/39/33). Backlight is GPIO 27, not 21 as on
; the 2.8" CYD — this is the most common source of a blank display on this board.
build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_RGB_ORDER=1
    -DTFT_INVERSION_OFF=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DUSE_HSPI_PORT=1
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_BL=27
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DCORE_DEBUG_LEVEL=0
