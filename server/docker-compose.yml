services:
  pocsag:
    build: .
    container_name: pocsag-publisher
    restart: unless-stopped
    devices:
      - /dev/bus/usb:/dev/bus/usb
    group_add:
      - plugdev
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
